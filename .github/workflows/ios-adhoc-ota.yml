name: Build Ad Hoc IPA

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: papertrail-ota-${{ github.ref }}
  cancel-in-progress: true

on:
  workflow_dispatch:
  push:
    branches:
      - master

jobs:
  build-adhoc:
    runs-on: macos-15
    env:
      APP_NAME: PaperTrail
      SCHEME: PaperTrail
      PROJECT_PATH: PaperTrail.xcodeproj
      CONFIGURATION: Release
      EXPORT_METHOD: ad-hoc
      BUNDLE_ID: nikhilsh.PaperTrail
      TEAM_ID: EHW7L3679R
      SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
      ARCHIVE_PATH: ${{ github.workspace }}/build/PaperTrail.xcarchive
      EXPORT_PATH: ${{ github.workspace }}/build/export
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Select Xcode 26.3
        run: |
          sudo xcode-select -s /Applications/Xcode_26.3.app/Contents/Developer
          xcodebuild -version

      - name: Decode signing assets
        env:
          IOS_CERT_P12_BASE64: ${{ secrets.IOS_CERT_P12_BASE64 }}
          IOS_PROFILE_BASE64: ${{ secrets.IOS_PROFILE_BASE64 }}
        run: |
          mkdir -p "$RUNNER_TEMP"
          CERT_PATH="$RUNNER_TEMP/distribution.p12"
          PROVISIONING_PROFILE_PATH="$RUNNER_TEMP/PaperTrail.mobileprovision"
          echo "$IOS_CERT_P12_BASE64" | base64 --decode > "$CERT_PATH"
          echo "$IOS_PROFILE_BASE64" | base64 --decode > "$PROVISIONING_PROFILE_PATH"

      - name: Install provisioning profile
        run: |
          PROVISIONING_PROFILE_PATH="$RUNNER_TEMP/PaperTrail.mobileprovision"
          mkdir -p "$HOME/Library/MobileDevice/Provisioning Profiles"
          security cms -D -i "$PROVISIONING_PROFILE_PATH" > "$RUNNER_TEMP/profile.plist"
          PROFILE_UUID=$(/usr/libexec/PlistBuddy -c 'Print UUID' "$RUNNER_TEMP/profile.plist")
          PROFILE_NAME=$(/usr/libexec/PlistBuddy -c 'Print Name' "$RUNNER_TEMP/profile.plist")
          echo "PROFILE_UUID=$PROFILE_UUID" >> "$GITHUB_ENV"
          echo "PROFILE_NAME=$PROFILE_NAME" >> "$GITHUB_ENV"
          cp "$PROVISIONING_PROFILE_PATH" "$HOME/Library/MobileDevice/Provisioning Profiles/$PROFILE_UUID.mobileprovision"

      - name: Create temporary keychain
        env:
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
          IOS_CERT_PASSWORD: ${{ secrets.IOS_CERT_PASSWORD }}
        run: |
          CERT_PATH="$RUNNER_TEMP/distribution.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/build.keychain-db"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -P "$IOS_CERT_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH" login.keychain-db
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

      - name: Generate export options
        run: |
          cat > "$RUNNER_TEMP/ExportOptions.plist" <<PLIST
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>destination</key>
            <string>export</string>
            <key>method</key>
            <string>ad-hoc</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>nikhilsh.PaperTrail</key>
              <string>${PROFILE_NAME}</string>
            </dict>
            <key>signingCertificate</key>
            <string>Apple Distribution</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>stripSwiftSymbols</key>
            <true/>
            <key>teamID</key>
            <string>${TEAM_ID}</string>
            <key>thinning</key>
            <string>&lt;none&gt;</string>
          </dict>
          </plist>
          PLIST

      - name: Show signing identities
        run: |
          KEYCHAIN_PATH="$RUNNER_TEMP/build.keychain-db"
          security find-identity -v -p codesigning "$KEYCHAIN_PATH"

      - name: Generate build secrets
        run: |
          cat > PaperTrail/GeneratedSecrets.swift <<EOF
          import Foundation

          enum BuildSecrets {
              static let sentryDSN = "${SENTRY_DSN}"
          }
          EOF

      - name: Show build settings
        run: xcodebuild -project "$PROJECT_PATH" -scheme "$SCHEME" -configuration "$CONFIGURATION" -showBuildSettings

      - name: Archive app
        run: |
          mkdir -p build
          xcodebuild \
            -project "$PROJECT_PATH" \
            -scheme "$SCHEME" \
            -configuration "$CONFIGURATION" \
            -archivePath "$ARCHIVE_PATH" \
            -destination 'generic/platform=iOS' \
            CODE_SIGN_STYLE=Manual \
            DEVELOPMENT_TEAM="$TEAM_ID" \
            CODE_SIGN_IDENTITY="Apple Distribution" \
            PROVISIONING_PROFILE="$PROFILE_UUID" \
            PRODUCT_BUNDLE_IDENTIFIER="$BUNDLE_ID" \
            SENTRY_DSN="$SENTRY_DSN" \
            clean archive

      - name: Export IPA
        run: |
          xcodebuild -exportArchive \
            -archivePath "$ARCHIVE_PATH" \
            -exportPath "$EXPORT_PATH" \
            -exportOptionsPlist "$RUNNER_TEMP/ExportOptions.plist"

      - name: Install sentry-cli
        run: |
          curl -sL https://sentry.io/get-cli/ | SENTRY_CLI_VERSION="2.40.0" sh

      - name: Upload dSYMs to Sentry
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}
        run: |
          # Verify dSYM files exist
          if [ -d "$ARCHIVE_PATH/dSYMs" ]; then
            echo "Found dSYMs directory at $ARCHIVE_PATH/dSYMs"
            ls -lh "$ARCHIVE_PATH/dSYMs"
          else
            echo "Warning: No dSYMs directory found at $ARCHIVE_PATH/dSYMs"
            exit 1
          fi

          # Upload dSYMs with source context for better stack traces
          sentry-cli debug-files upload \
            --auth-token "$SENTRY_AUTH_TOKEN" \
            --org "$SENTRY_ORG" \
            --project "$SENTRY_PROJECT" \
            --include-sources \
            "$ARCHIVE_PATH/dSYMs"

          echo "✅ dSYMs uploaded successfully to Sentry"

      - name: Prepare OTA site assets
        env:
          RELEASE_BASE_URL: https://github.com/${{ github.repository }}/releases/download/adhoc-latest
        run: |
          mkdir -p ota
          cp "$EXPORT_PATH/PaperTrail.ipa" ota/PaperTrail.ipa
          REPO_NAME="${GITHUB_REPOSITORY#*/}"
          export IPA_URL="$RELEASE_BASE_URL/PaperTrail.ipa"
          export MANIFEST_URL="https://${GITHUB_REPOSITORY_OWNER}.github.io/${REPO_NAME}/manifest.plist"
          export BUILD_UPLOAD_TIME="$(date -u '+%Y-%m-%d %H:%M UTC')"
          export BUILD_UPLOAD_TIME_ISO="$(date -u '+%Y-%m-%dT%H:%M:%SZ')"
          export BUILD_CHANGELOG="$(git log -1 --pretty=%s | tr '\n' ' ' | sed 's/[&<>]/ /g')"
          envsubst < .github/ota/manifest.plist.template > ota/manifest.plist
          envsubst < .github/ota/index.html.template > ota/index.html

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: papertrail-adhoc-build
          path: |
            build/export/PaperTrail.ipa
            ota/manifest.plist
            ota/index.html

      - name: Publish rolling release
        if: github.ref == 'refs/heads/master'
        env:
          GH_TOKEN: ${{ secrets.GH_RELEASE_PAT }}
        run: |
          if gh release view adhoc-latest >/dev/null 2>&1; then
            gh release upload adhoc-latest \
              build/export/PaperTrail.ipa \
              --clobber
          else
            gh release create adhoc-latest \
              build/export/PaperTrail.ipa \
              --title "PaperTrail Ad Hoc Latest" \
              --notes "Latest Ad Hoc build for PaperTrail." \
              --prerelease
          fi

      - name: Upload Pages artifact
        if: github.ref == 'refs/heads/master'
        uses: actions/upload-pages-artifact@v3
        with:
          path: ota

      - name: Deploy to GitHub Pages
        if: github.ref == 'refs/heads/master'
        uses: actions/deploy-pages@v4
