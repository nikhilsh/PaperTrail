name: Build Ad Hoc IPA

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: papertrail-ota-${{ github.ref }}
  cancel-in-progress: true

on:
  workflow_dispatch:
  push:
    branches:
      - master

jobs:
  build-adhoc:
    runs-on: macos-26
    env:
      APP_NAME: PaperTrail
      SCHEME: PaperTrail
      PROJECT_PATH: PaperTrail.xcodeproj
      CONFIGURATION: Release
      EXPORT_METHOD: ad-hoc
      BUNDLE_ID: nikhilsh.PaperTrail
      TEAM_ID: EHW7L3679R
      SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
      ARCHIVE_PATH: ${{ github.workspace }}/build/PaperTrail.xcarchive
      EXPORT_PATH: ${{ github.workspace }}/build/export
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Select Xcode 26.5
        run: |
          sudo xcode-select -s /Applications/Xcode_26.5.app/Contents/Developer
          xcodebuild -version

      - name: Decode signing assets
        env:
          IOS_CERT_P12_BASE64: ${{ secrets.IOS_CERT_P12_BASE64 }}
          IOS_PROFILE_BASE64: ${{ secrets.IOS_PROFILE_BASE64 }}
          IOS_WIDGET_PROFILE_BASE64: ${{ secrets.IOS_WIDGET_PROFILE_BASE64 }}
          IOS_SHARE_PROFILE_BASE64: ${{ secrets.IOS_SHARE_PROFILE_BASE64 }}
        run: |
          mkdir -p "$RUNNER_TEMP"
          CERT_PATH="$RUNNER_TEMP/distribution.p12"
          PROVISIONING_PROFILE_PATH="$RUNNER_TEMP/PaperTrail.mobileprovision"
          WIDGET_PROVISIONING_PROFILE_PATH="$RUNNER_TEMP/PaperTrailWidgets.mobileprovision"
          SHARE_PROVISIONING_PROFILE_PATH="$RUNNER_TEMP/PaperTrailShare.mobileprovision"
          echo "$IOS_CERT_P12_BASE64" | base64 --decode > "$CERT_PATH"
          echo "$IOS_PROFILE_BASE64" | base64 --decode > "$PROVISIONING_PROFILE_PATH"
          echo "$IOS_WIDGET_PROFILE_BASE64" | base64 --decode > "$WIDGET_PROVISIONING_PROFILE_PATH"
          echo "$IOS_SHARE_PROFILE_BASE64" | base64 --decode > "$SHARE_PROVISIONING_PROFILE_PATH"

      - name: Install provisioning profiles
        run: |
          mkdir -p "$HOME/Library/MobileDevice/Provisioning Profiles"

          install_profile() {
            local path="$1"
            security cms -D -i "$path" > "$RUNNER_TEMP/profile.plist"
            local uuid name
            uuid=$(/usr/libexec/PlistBuddy -c 'Print UUID' "$RUNNER_TEMP/profile.plist")
            name=$(/usr/libexec/PlistBuddy -c 'Print Name' "$RUNNER_TEMP/profile.plist")
            cp "$path" "$HOME/Library/MobileDevice/Provisioning Profiles/$uuid.mobileprovision"
            echo "$uuid|$name"
          }

          IFS='|' read -r PROFILE_UUID PROFILE_NAME <<< "$(install_profile "$RUNNER_TEMP/PaperTrail.mobileprovision")"
          IFS='|' read -r WIDGET_PROFILE_UUID WIDGET_PROFILE_NAME <<< "$(install_profile "$RUNNER_TEMP/PaperTrailWidgets.mobileprovision")"
          IFS='|' read -r SHARE_PROFILE_UUID SHARE_PROFILE_NAME <<< "$(install_profile "$RUNNER_TEMP/PaperTrailShare.mobileprovision")"

          echo "PROFILE_UUID=$PROFILE_UUID" >> "$GITHUB_ENV"
          echo "PROFILE_NAME=$PROFILE_NAME" >> "$GITHUB_ENV"
          echo "WIDGET_PROFILE_NAME=$WIDGET_PROFILE_NAME" >> "$GITHUB_ENV"
          echo "SHARE_PROFILE_NAME=$SHARE_PROFILE_NAME" >> "$GITHUB_ENV"
          echo "Installed: $PROFILE_NAME ($PROFILE_UUID), $WIDGET_PROFILE_NAME ($WIDGET_PROFILE_UUID), $SHARE_PROFILE_NAME ($SHARE_PROFILE_UUID)"

      - name: Create temporary keychain
        env:
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
          IOS_CERT_PASSWORD: ${{ secrets.IOS_CERT_PASSWORD }}
        run: |
          CERT_PATH="$RUNNER_TEMP/distribution.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/build.keychain-db"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -P "$IOS_CERT_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH" login.keychain-db
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

      - name: Generate export options
        run: |
          cat > "$RUNNER_TEMP/ExportOptions.plist" <<PLIST
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>destination</key>
            <string>export</string>
            <key>method</key>
            <string>ad-hoc</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>nikhilsh.PaperTrail</key>
              <string>${PROFILE_NAME}</string>
              <key>nikhilsh.PaperTrail.widgets</key>
              <string>PaperTrail Widgets AdHoc</string>
              <key>nikhilsh.PaperTrail.share</key>
              <string>PaperTrail Share AdHoc</string>
            </dict>
            <key>signingCertificate</key>
            <string>Apple Distribution</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>stripSwiftSymbols</key>
            <true/>
            <key>teamID</key>
            <string>${TEAM_ID}</string>
            <key>thinning</key>
            <string>&lt;none&gt;</string>
          </dict>
          </plist>
          PLIST

      - name: Show signing identities
        run: |
          KEYCHAIN_PATH="$RUNNER_TEMP/build.keychain-db"
          security find-identity -v -p codesigning "$KEYCHAIN_PATH"

      - name: Generate build secrets
        run: |
          cat > PaperTrail/GeneratedSecrets.swift <<EOF
          import Foundation

          enum BuildSecrets {
              static let sentryDSN = "${SENTRY_DSN}"
              static let supabaseURL = "${SUPABASE_URL}"
              static let supabaseAnonKey = "${SUPABASE_ANON_KEY}"
          }
          EOF

      - name: Show build settings
        run: xcodebuild -project "$PROJECT_PATH" -scheme "$SCHEME" -configuration "$CONFIGURATION" -showBuildSettings

      - name: Archive app
        # NOTE: PROVISIONING_PROFILE / PRODUCT_BUNDLE_IDENTIFIER are deliberately
        # NOT passed here. xcodebuild command-line build-setting overrides apply
        # uniformly to every target in the build — with the widget + share
        # extensions now embedded, a global override would force them to sign
        # with the app's own bundle ID/profile and fail. Each target instead
        # carries its own PRODUCT_BUNDLE_IDENTIFIER + PROVISIONING_PROFILE_SPECIFIER
        # in project.pbxproj; CODE_SIGN_STYLE/DEVELOPMENT_TEAM/CODE_SIGN_IDENTITY
        # are identical across all three targets so they're safe to force globally.
        run: |
          mkdir -p build
          xcodebuild \
            -project "$PROJECT_PATH" \
            -scheme "$SCHEME" \
            -configuration "$CONFIGURATION" \
            -archivePath "$ARCHIVE_PATH" \
            -destination 'generic/platform=iOS' \
            CODE_SIGN_STYLE=Manual \
            DEVELOPMENT_TEAM="$TEAM_ID" \
            CODE_SIGN_IDENTITY="Apple Distribution" \
            SENTRY_DSN="$SENTRY_DSN" \
            clean archive

      - name: Export IPA
        run: |
          xcodebuild -exportArchive \
            -archivePath "$ARCHIVE_PATH" \
            -exportPath "$EXPORT_PATH" \
            -exportOptionsPlist "$RUNNER_TEMP/ExportOptions.plist"

      # Xcode's INFOPLIST_KEY_* mechanism silently drops keys it doesn't
      # recognize — build 27 shipped without CKSharingSupported that way, so
      # share invites bounced to the App Store on devices that HAD the app.
      # Fail the build if the merged Info.plist ever loses these again.
      - name: Verify required Info.plist keys
        run: |
          APP_PLIST="$ARCHIVE_PATH/Products/Applications/PaperTrail.app/Info.plist"
          /usr/libexec/PlistBuddy -c "Print CKSharingSupported" "$APP_PLIST"
          /usr/libexec/PlistBuddy -c "Print UIBackgroundModes" "$APP_PLIST" | grep -q "remote-notification"

      - name: Read app version
        run: |
          APP_PLIST="$ARCHIVE_PATH/Products/Applications/PaperTrail.app/Info.plist"
          SHORT=$(/usr/libexec/PlistBuddy -c "Print CFBundleShortVersionString" "$APP_PLIST")
          BUILD=$(/usr/libexec/PlistBuddy -c "Print CFBundleVersion" "$APP_PLIST")
          echo "APP_SHORT_VERSION=$SHORT" >> "$GITHUB_ENV"
          echo "APP_BUILD=$BUILD" >> "$GITHUB_ENV"
          printf '{"shortVersion":"%s","build":"%s"}\n' "$SHORT" "$BUILD" > "$GITHUB_WORKSPACE/app-version.json"
          echo "App version: $SHORT ($BUILD)"

      - name: Install sentry-cli
        run: |
          curl -sL https://sentry.io/get-cli/ | SENTRY_CLI_VERSION="2.40.0" sh

      - name: Upload dSYMs to Sentry
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}
        run: |
          # Verify dSYM files exist
          if [ -d "$ARCHIVE_PATH/dSYMs" ]; then
            echo "Found dSYMs directory at $ARCHIVE_PATH/dSYMs"
            ls -lh "$ARCHIVE_PATH/dSYMs"
          else
            echo "Warning: No dSYMs directory found at $ARCHIVE_PATH/dSYMs"
            exit 1
          fi

          # Upload dSYMs with source context for better stack traces
          sentry-cli debug-files upload \
            --auth-token "$SENTRY_AUTH_TOKEN" \
            --org "$SENTRY_ORG" \
            --project "$SENTRY_PROJECT" \
            --include-sources \
            "$ARCHIVE_PATH/dSYMs"

          echo "✅ dSYMs uploaded successfully to Sentry"

      - name: Prepare OTA site assets
        env:
          RELEASE_BASE_URL: https://github.com/${{ github.repository }}/releases/download/adhoc-latest
        run: |
          mkdir -p ota
          cp "$EXPORT_PATH/PaperTrail.ipa" ota/PaperTrail.ipa
          REPO_NAME="${GITHUB_REPOSITORY#*/}"
          export IPA_URL="$RELEASE_BASE_URL/PaperTrail.ipa"
          export MANIFEST_URL="https://${GITHUB_REPOSITORY_OWNER}.github.io/${REPO_NAME}/manifest.plist"
          export BUILD_UPLOAD_TIME="$(date -u '+%Y-%m-%d %H:%M UTC')"
          export BUILD_UPLOAD_TIME_ISO="$(date -u '+%Y-%m-%dT%H:%M:%SZ')"
          export BUILD_CHANGELOG="$(git log -1 --pretty=%s | tr '\n' ' ' | sed 's/[&<>]/ /g')"
          envsubst < .github/ota/manifest.plist.template > ota/manifest.plist
          envsubst < .github/ota/index.html.template > ota/index.html

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: papertrail-adhoc-build
          path: |
            build/export/PaperTrail.ipa
            ota/manifest.plist
            ota/index.html

      - name: Publish rolling release
        if: github.ref == 'refs/heads/master'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh release view adhoc-latest >/dev/null 2>&1; then
            gh release upload adhoc-latest \
              build/export/PaperTrail.ipa \
              app-version.json \
              --clobber
            gh release edit adhoc-latest \
              --title "PaperTrail v${APP_SHORT_VERSION} (${APP_BUILD})" \
              --notes "Latest Ad Hoc build — v${APP_SHORT_VERSION} (build ${APP_BUILD})."
          else
            gh release create adhoc-latest \
              build/export/PaperTrail.ipa \
              app-version.json \
              --title "PaperTrail v${APP_SHORT_VERSION} (${APP_BUILD})" \
              --notes "Latest Ad Hoc build — v${APP_SHORT_VERSION} (build ${APP_BUILD})." \
              --prerelease
          fi

      - name: Upload Pages artifact
        if: github.ref == 'refs/heads/master'
        uses: actions/upload-pages-artifact@v3
        with:
          path: ota

      - name: Deploy to GitHub Pages
        if: github.ref == 'refs/heads/master'
        uses: actions/deploy-pages@v4
